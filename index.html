<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<meta name="color-scheme" content="dark">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --bg: #050506;
  --bg-card: rgba(255, 255, 255, 0.04);
  --border: rgba(255, 255, 255, 0.06);
  --border-soft: rgba(255, 255, 255, 0.04);
  --border-strong: rgba(255, 255, 255, 0.12);
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --text-quaternary: #4D4B47;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 15px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body { min-height: 100vh; position: relative; overflow-x: hidden; }

body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(60% 50% at 82% 14%, rgba(224, 118, 88, 0.16) 0%, transparent 60%),
    radial-gradient(50% 40% at 18% 90%, rgba(180, 180, 200, 0.06) 0%, transparent 60%);
  filter: blur(40px);
  pointer-events: none; z-index: 0;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none; z-index: 1;
}
@keyframes drift { 0% { transform: translate(0, 0); } 100% { transform: translate(-2%, 2%); } }

main {
  position: relative; z-index: 2;
  max-width: 900px; margin: 0 auto;
  padding: 56px 20px 96px;
  padding-top: max(56px, env(safe-area-inset-top, 56px));
}

.dash-title {
  margin: 0 0 28px;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

/* ── Bento grid ─────────────────────────────────────────────────────────── */
.bento {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 168px;
  gap: 14px;
  grid-auto-flow: dense;
}

/* ── Tile base ──────────────────────────────────────────────────────────── */
.tile {
  --accent: #6BE3A4;
  position: relative;
  display: flex;
  flex-direction: column;
  padding: 18px 20px 16px;
  border-radius: 18px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  text-decoration: none;
  color: inherit;
  overflow: hidden;
  transition:
    transform 0.20s cubic-bezier(0.22, 1, 0.36, 1),
    border-color 0.20s,
    box-shadow 0.20s;
  box-shadow:
    0 1px 0 0 rgba(255,255,255,0.06) inset,
    0 4px 20px rgba(0,0,0,0.30);
}
.tile:hover {
  transform: translateY(-3px);
  border-color: var(--accent);
  box-shadow:
    0 1px 0 0 rgba(255,255,255,0.08) inset,
    0 12px 32px rgba(0,0,0,0.45);
}

.tile.big  { grid-column: span 2; grid-row: span 2; }
.tile.wide { grid-column: span 2; }

/* ── Tile contents ──────────────────────────────────────────────────────── */
.tile-num {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.16em;
  color: var(--text-quaternary);
  line-height: 1;
}

.tile-emoji {
  position: absolute;
  top: 16px;
  right: 18px;
  font-size: 28px;
  line-height: 1;
  filter: drop-shadow(0 0 10px var(--accent));
  pointer-events: none;
  user-select: none;
}
.tile.big .tile-emoji {
  font-size: 44px;
  top: 20px;
  right: 22px;
}

.tile-spacer { flex: 1; }

.tile-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.02em;
  margin-bottom: 5px;
  line-height: 1.2;
}
.tile.big .tile-title { font-size: 26px; }

.tile-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.tile-sub {
  font-size: 12px;
  color: var(--text-tertiary);
  line-height: 1.3;
}

.tile-arrow {
  font-size: 15px;
  color: var(--accent);
  flex-shrink: 0;
  transition: transform 0.20s cubic-bezier(0.22, 1, 0.36, 1);
}
.tile:hover .tile-arrow { transform: translateX(5px); }

/* ── Responsive ─────────────────────────────────────────────────────────── */
@media (max-width: 720px) {
  .bento { grid-template-columns: repeat(2, 1fr); }
  .tile.big { grid-row: span 1; }
}

@media (max-width: 440px) {
  .bento { grid-template-columns: 1fr; gap: 10px; }
  .tile.big,
  .tile.wide { grid-column: span 1; grid-row: span 1; }
}

::selection { background: rgba(224, 118, 88, 0.3); color: var(--text-primary); }
</style>
</head>
<body>

<main>
  <h1 class="dash-title">Dashboard</h1>

  <div class="bento">

    <a href="main.html" class="tile big" style="--accent:#6BE3A4">
      <span class="tile-num">·01</span>
      <span class="tile-emoji">🏠</span>
      <div class="tile-spacer"></div>
      <div class="tile-title">Main</div>
      <div class="tile-footer">
        <span class="tile-sub">Goals &amp; daily plan</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <a href="gym.html" class="tile wide" style="--accent:#7DD3FC">
      <span class="tile-num">·02</span>
      <span class="tile-emoji">💪</span>
      <div class="tile-spacer"></div>
      <div class="tile-title">Fitness</div>
      <div class="tile-footer">
        <span class="tile-sub">Workouts, splits, sessions</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <a href="health.html" class="tile" style="--accent:#A7F3D0">
      <span class="tile-num">·03</span>
      <span class="tile-emoji">💊</span>
      <div class="tile-spacer"></div>
      <div class="tile-title">Health</div>
      <div class="tile-footer">
        <span class="tile-sub">Supplements &amp; vitals</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <a href="po-water.html" class="tile" style="--accent:#60A5FA">
      <span class="tile-num">·04</span>
      <span class="tile-emoji">💧</span>
      <div class="tile-spacer"></div>
      <div class="tile-title">Water</div>
      <div class="tile-footer">
        <span class="tile-sub">Hydration</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <a href="finance.html" class="tile wide" style="--accent:#F2C063">
      <span class="tile-num">·05</span>
      <span class="tile-emoji">📊</span>
      <div class="tile-spacer"></div>
      <div class="tile-title">Finance</div>
      <div class="tile-footer">
        <span class="tile-sub">Net worth &amp; spending</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

  </div>
</main>

</body>
</html>
